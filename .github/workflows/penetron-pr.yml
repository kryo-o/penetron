name: Penetron PR Security Gate

# Fires Penetron on every PR that touches the target app:
#   Layer 1 (SAST + change-impact, scoped to the diff) -> candidate findings
#   Layer 2 (prove or discard each, against the running app) -> verdicts + gate
#   -> posts a PR comment, uploads evidence, and (optionally) starts the UiPath Maestro process.
#
# This is the "on PR" entry point of the architecture (Trigger -> Layer 1 -> Layer 2 -> gate).

on:
  pull_request:
    paths:
      - 'target-app/**'
      - 'pentests/**'
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: write

jobs:
  penetron:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ---- deps ----
      - name: Install Penetron engine
        working-directory: pentests
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: Build & start target app (non-production fixture)
        working-directory: target-app
        run: |
          npm ci || npm install
          npm run build:client
          (npm start &)
          # wait for health
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/api/health >/dev/null; then echo "target up"; break; fi
            sleep 1
          done

      # ---- Layer 1: SAST + impact, scoped to the PR diff ----
      - name: Layer 1 — analyze the PR diff
        working-directory: pentests
        env:
          PENETRON_DIFF_RANGE: origin/${{ github.base_ref }}...HEAD
          PENETRON_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: npm run layer1

      # ---- Layer 2: prove or discard each candidate against the running app ----
      - name: Layer 2 — prove exploitability
        working-directory: pentests
        env:
          PENETRON_TARGET_URL: http://localhost:4000
        run: |
          npm run exploit:pr
          npm run report

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: penetron-evidence
          path: |
            pentests/evidence/verdicts.json
            pentests/evidence/gate-summary.json
            pentests/evidence/exploitable-vulnerabilities.md
            pentests/evidence/suggested-improvements.md
            pentests/evidence/*.png
            engine/generated/*.json
          if-no-files-found: ignore

      # ---- PR comment: candidates + proven verdicts + gate ----
      - name: Comment results on the PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = (p) => { try { return JSON.parse(fs.readFileSync(p, 'utf8')); } catch { return null; } };
            const cand = read('engine/generated/candidate-findings.json');
            const v = read('pentests/evidence/verdicts.json');
            const gate = read('pentests/evidence/gate-summary.json');
            if (!cand) { core.info('no Layer 1 output'); return; }

            const verds = (v && v.verdicts) || [];
            const proven = verds.filter(x => x.exploited);
            const discarded = verds.filter(x => !x.exploited);
            const icon = (e) => e ? '🔴 exploited' : '🟢 discarded';

            const rows = verds.map(x =>
              `| ${x.exploited ? '🔴' : '🟢'} | \`${x.vulnClass}\` | ${x.title} | ${icon(x.exploited)} |`
            ).join('\n');

            const gateLine = gate
              ? `**Gate: \`${gate.decision}\`** — ${gate.exploitedCount} exploited · ${gate.discardedCount} discarded · priority ${gate.jiraPriority}`
              : '';

            const body = [
              '<!-- penetron-report -->',
              '## 🛡️ Penetron — PR Security Gate',
              '',
              `**Layer 1** flagged **${cand.findings.length}** candidate(s) in the changed code; **Layer 2** proved or discarded each against the running app.`,
              '',
              `> _Flagged ${cand.findings.length} → proved ${proven.length}, discarded ${discarded.length}._`,
              '',
              gateLine,
              '',
              '| | Class | Finding | Verdict |',
              '|---|---|---|---|',
              rows,
              '',
              '<sub>Penetron proves exploitability and reports only what it actually exploited. Evidence is attached to this run; UiPath Maestro governs the fix.</sub>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes('<!-- penetron-report -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      # ---- Optional: hand off to UiPath Maestro for governed approval + Jira/Slack ----
      # Enabled only when Orchestrator secrets are configured on the repo.
      - name: Trigger UiPath Maestro (optional)
        if: ${{ env.UIPATH_ORCH_TOKEN != '' }}
        env:
          UIPATH_ORCH_TOKEN: ${{ secrets.UIPATH_ORCH_TOKEN }}
          UIPATH_ORCH_START_URL: ${{ secrets.UIPATH_ORCH_START_URL }}
        run: |
          echo "Starting UiPath Maestro process '${{ secrets.UIPATH_PROCESS_NAME }}'..."
          curl -sf -X POST "$UIPATH_ORCH_START_URL" \
            -H "Authorization: Bearer $UIPATH_ORCH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"startInfo\":{\"ReleaseKey\":\"${{ secrets.UIPATH_RELEASE_KEY }}\",\"InputArguments\":\"{\\\"prNumber\\\":${{ github.event.pull_request.number }}}\"}}" \
            || echo "Maestro start skipped/failed (non-blocking)."
